# dusk.nvim — dusk-soft — tmux theme
# https://github.com/yourname/dusk.nvim
# Generated by lua/dusk/extras/terminal.lua
# Add to ~/.tmux.conf: source-file ~/.config/tmux/themes/dusk-soft.conf

# Status bar
set -g status-style "bg=#111418,fg=#dcd7ba"
set -g status-left-style "bg=#e6c384,fg=#111418,bold"
set -g status-right-style "bg=#242930,fg=#dcd7ba"

# Window titles
set -g window-status-style "bg=#111418,fg=#dcd7ba"
set -g window-status-current-style "bg=#e6c384,fg=#111418,bold"

# Pane borders
set -g pane-border-style "fg=#242930"
set -g pane-active-border-style "fg=#e6c384"

# Message / command line
set -g message-style "bg=#e6c384,fg=#111418"

# Selection in copy mode
set -g mode-style "bg=#2a3241,fg=#dcd7ba"
