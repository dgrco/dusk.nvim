# dusk.nvim — dusk-dawn — tmux theme
# https://github.com/yourname/dusk.nvim
# Generated by lua/dusk/extras/terminal.lua
# Add to ~/.tmux.conf: source-file ~/.config/tmux/themes/dusk-dawn.conf

# Status bar
set -g status-style "bg=#1e2228,fg=#dcd7ba"
set -g status-left-style "bg=#e6c384,fg=#1e2228,bold"
set -g status-right-style "bg=#30373f,fg=#dcd7ba"

# Window titles
set -g window-status-style "bg=#1e2228,fg=#dcd7ba"
set -g window-status-current-style "bg=#e6c384,fg=#1e2228,bold"

# Pane borders
set -g pane-border-style "fg=#30373f"
set -g pane-active-border-style "fg=#e6c384"

# Message / command line
set -g message-style "bg=#e6c384,fg=#1e2228"

# Selection in copy mode
set -g mode-style "bg=#35424f,fg=#dcd7ba"
