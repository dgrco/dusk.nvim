# dusk.nvim — dusk — tmux theme
# https://github.com/yourname/dusk.nvim
# Generated by lua/dusk/extras/terminal.lua
# Add to ~/.tmux.conf: source-file ~/.config/tmux/themes/dusk.conf

# Status bar
set -g status-style "bg=#0d1117,fg=#dcd7ba"
set -g status-left-style "bg=#e6c384,fg=#0d1117,bold"
set -g status-right-style "bg=#21262d,fg=#dcd7ba"

# Window titles
set -g window-status-style "bg=#0d1117,fg=#dcd7ba"
set -g window-status-current-style "bg=#e6c384,fg=#0d1117,bold"

# Pane borders
set -g pane-border-style "fg=#21262d"
set -g pane-active-border-style "fg=#e6c384"

# Message / command line
set -g message-style "bg=#e6c384,fg=#0d1117"

# Selection in copy mode
set -g mode-style "bg=#2a3241,fg=#dcd7ba"
