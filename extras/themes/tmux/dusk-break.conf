# dusk.nvim — dusk-break — tmux theme
# https://github.com/yourname/dusk.nvim
# Generated by lua/dusk/extras/terminal.lua
# Add to ~/.tmux.conf: source-file ~/.config/tmux/themes/dusk-break.conf

# Status bar
set -g status-style "bg=#262427,fg=#f0ece0"
set -g status-left-style "bg=#f6c177,fg=#262427,bold"
set -g status-right-style "bg=#38363d,fg=#f0ece0"

# Window titles
set -g window-status-style "bg=#262427,fg=#f0ece0"
set -g window-status-current-style "bg=#f6c177,fg=#262427,bold"

# Pane borders
set -g pane-border-style "fg=#38363d"
set -g pane-active-border-style "fg=#f6c177"

# Message / command line
set -g message-style "bg=#f6c177,fg=#262427"

# Selection in copy mode
set -g mode-style "bg=#3a3f46,fg=#f0ece0"
